name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: soumyakube

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job: lint-and-test
  # ─────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install shared dependencies
          pip install -r src/shared/requirements.txt 2>/dev/null || true
          # Install each service's dependencies
          for svc in gateway auth-service account-service transaction-service fraud-service notification-service; do
            pip install -r services/$svc/requirements.txt 2>/dev/null || true
          done
          # Install linting tools
          pip install ruff mypy

      - name: Compile-check all Python main files
        run: |
          find . -name "main.py" -not -path "./.venv/*" -exec python -m py_compile {} \; && echo "All main.py files compile OK"

      - name: Run ruff linter
        run: |
          ruff check services/ src/ || true
        continue-on-error: false

      - name: Run mypy type check on shared
        run: |
          mypy --ignore-missing-imports src/shared/ || echo "mypy completed with some errors (non-blocking)"

  # ─────────────────────────────────────────────────────────────────────────
  # Job: build-and-push
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, auth-service, account-service, transaction-service, fraud-service, notification-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            --tag $IMAGE_PREFIX/${{ matrix.service }}:${{ github.sha }} \
            --tag $IMAGE_PREFIX/${{ matrix.service }}:latest \
            --file services/${{ matrix.service }}/Dockerfile .

      - name: Push image with SHA tag
        run: |
          docker push $IMAGE_PREFIX/${{ matrix.service }}:${{ github.sha }}
          docker push $IMAGE_PREFIX/${{ matrix.service }}:latest

  # ─────────────────────────────────────────────────────────────────────────
  # Job: package-helm
  # ─────────────────────────────────────────────────────────────────────────
  package-helm:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: |
          helm lint helm/banking-app/

      - name: Helm template validation
        run: |
          helm template banking-app helm/banking-app/ > rendered.yaml
          if [ -s rendered.yaml ]; then
            echo "Helm template rendered successfully ($(wc -l < rendered.yaml) lines)"
          else
            echo "ERROR: rendered.yaml is empty"
            exit 1
          fi

      - name: Package Helm chart
        run: |
          helm package helm/banking-app/ --version 0.1.0-${{ github.sha }}

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: banking-app-chart
          path: banking-app-*.tgz
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # Job: deploy
  # Runs only on push to main or manual dispatch
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-and-push, package-helm]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Deployment skipped
        run: |
          echo "Docker Desktop Kubernetes is local."
          echo "GitHub Actions cannot access your laptop cluster directly."
          echo "Run Helm deployment manually from your laptop."
