global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'banking-services'
    static_configs:
      - targets:
          - 'gateway:8000'
          - 'auth-service:8001'
          - 'account-service:8002'
          - 'transaction-service:8003'
          - 'fraud-service:8004'
          - 'notification-service:8005'
    metrics_path: /metrics
    scrape_interval: 10s