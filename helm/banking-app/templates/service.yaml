{{/*
Service resources for all 6 microservices.
*/}}
{{- $root := . }}
{{- $namespace := .Values.global.namespace | default "banking" }}
{{- range $serviceName, $svc := .Values }}
{{-   if and (hasKey $svc "enabled") $svc.enabled }}
{{-     if has $serviceName (list "gateway" "authService" "accountService" "transactionService" "fraudService" "notificationService") }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: {{ $serviceName }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    app.kubernetes.io/managed-by: {{ $root.Release.Service }}
    app.kubernetes.io/component: microservice
spec:
  type: {{ $svc.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ $serviceName }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
{{-   end }}
{{- end }}
{{- end }}