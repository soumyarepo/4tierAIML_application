{{/*
Kubernetes Secrets — holds all sensitive configuration for the banking app.
Values should be provided at install time via --set or an external secrets manager
(e.g. Vault, AWS Secrets Manager, GCP Secret Manager).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: banking-secrets
  namespace: {{ .Values.global.namespace | default "banking" }}
  labels:
    {{- include "banking-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{/* JWT signing secret — generate a strong random value in production */}}
  jwt-secret: {{ .Values.secrets.jwtSecret | default (randAlphaNum 32) | quote }}
  {{/* PostgreSQL password for bankuser */}}
  postgres-password: {{ .Values.secrets.postgresPassword | default "bankpass" | quote }}
  {{/* MongoDB password for bankuser */}}
  mongo-password: {{ .Values.secrets.mongoPassword | default "bankpass" | quote }}
  {{/* Redis AUTH password */}}
  redis-password: {{ .Values.secrets.redisPassword | default "bankpass" | quote }}