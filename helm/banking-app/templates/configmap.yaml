{{/*
ConfigMap — holds non-sensitive environment variables and service configuration.
Sensitive values must go in the banking-secrets Secret.
*/}}
{{- $config := .Values.config | default dict }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: banking-configmap
  namespace: {{ .Values.global.namespace | default "banking" }}
  labels:
    {{- include "banking-app.labels" . | nindent 4 }}
data:
  SERVICE_NAME: "banking-app"

  KAFKA_BOOTSTRAP_SERVERS: {{ $config.kafkaBootstrapServers | default "kafka:29092" | quote }}

  REDIS_URL: {{ $config.redisUrl | default "redis://redis:6379" | quote }}

  MONGO_URL: {{ $config.mongoUrl | default "mongodb://bank-mongo:27017" | quote }}

  POSTGRES_HOST: {{ $config.postgresHost | default "bank-postgres" | quote }}
  POSTGRES_PORT: {{ $config.postgresPort | default "5432" | quote }}
  POSTGRES_DB_AUTH: {{ $config.postgresDbAuth | default "bank_auth" | quote }}
  POSTGRES_DB_ACCOUNTS: {{ $config.postgresDbAccounts | default "bank_accounts" | quote }}
  POSTGRES_DB_TRANSACTIONS: {{ $config.postgresDbTransactions | default "bank_transactions" | quote }}

  AUTH_SERVICE_URL: "http://auth-service:8001"
  ACCOUNT_SERVICE_URL: "http://account-service:8002"
  TRANSACTION_SERVICE_URL: "http://transaction-service:8003"
  FRAUD_SERVICE_URL: "http://fraud-service:8004"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8005"

  LOG_LEVEL: {{ $config.logLevel | default "INFO" | quote }}
  ENVIRONMENT: {{ $config.environment | default "production" | quote }}

  RATE_LIMIT_REQUESTS: {{ $config.rateLimitRequests | default "100" | quote }}
  RATE_LIMIT_WINDOW_SECONDS: {{ $config.rateLimitWindowSeconds | default "60" | quote }}

  FRAUD_HIGH_RISK_THRESHOLD: {{ $config.fraudHighRiskThreshold | default "70" | quote }}