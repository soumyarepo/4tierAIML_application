{{/*
ConfigMap — holds non-sensitive environment variables and service configuration.
Sensitive values must go in the banking-secrets Secret.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: banking-configmap
  namespace: {{ .Values.global.namespace | default "banking" }}
  labels:
    {{- include "banking-app.labels" . | nindent 4 }}
data:
  SERVICE_NAME: "banking-app"

  KAFKA_BOOTSTRAP_SERVERS: {{ dig "config" "kafkaBootstrapServers" "kafka:29092" .Values | quote }}

  REDIS_URL: {{ dig "config" "redisUrl" "redis://redis:6379" .Values | quote }}

  MONGO_URL: {{ dig "config" "mongoUrl" "mongodb://bank-mongo:27017" .Values | quote }}

  POSTGRES_HOST: {{ dig "config" "postgresHost" "bank-postgres" .Values | quote }}
  POSTGRES_PORT: {{ dig "config" "postgresPort" "5432" .Values | quote }}
  POSTGRES_DB_AUTH: {{ dig "config" "postgresDbAuth" "bank_auth" .Values | quote }}
  POSTGRES_DB_ACCOUNTS: {{ dig "config" "postgresDbAccounts" "bank_accounts" .Values | quote }}
  POSTGRES_DB_TRANSACTIONS: {{ dig "config" "postgresDbTransactions" "bank_transactions" .Values | quote }}

  AUTH_SERVICE_URL: "http://auth-service:8001"
  ACCOUNT_SERVICE_URL: "http://account-service:8002"
  TRANSACTION_SERVICE_URL: "http://transaction-service:8003"
  FRAUD_SERVICE_URL: "http://fraud-service:8004"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8005"

  LOG_LEVEL: {{ dig "config" "logLevel" "INFO" .Values | quote }}
  ENVIRONMENT: {{ dig "config" "environment" "production" .Values | quote }}

  RATE_LIMIT_REQUESTS: {{ dig "config" "rateLimitRequests" "100" .Values | quote }}
  RATE_LIMIT_WINDOW_SECONDS: {{ dig "config" "rateLimitWindowSeconds" "60" .Values | quote }}

  FRAUD_HIGH_RISK_THRESHOLD: {{ dig "config" "fraudHighRiskThreshold" "70" .Values | quote }}