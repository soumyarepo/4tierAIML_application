{{- $root := . }}
{{- $namespace := .Values.global.namespace | default "banking" }}

{{- $services := dict
  "gateway" .Values.gateway
  "authService" .Values.authService
  "accountService" .Values.accountService
  "transactionService" .Values.transactionService
  "fraudService" .Values.fraudService
  "notificationService" .Values.notificationService
}}

{{- range $serviceName, $service := $services }}
{{- if $service.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ kebabcase $serviceName }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: {{ kebabcase $serviceName }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    app.kubernetes.io/component: application
    app.kubernetes.io/managed-by: {{ $root.Release.Service }}
spec:
  replicas: {{ $service.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ kebabcase $serviceName }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ kebabcase $serviceName }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/component: application
    spec:
      serviceAccountName: {{ include "banking-app.serviceAccountName" $root }}
      enableServiceLinks: false
      containers:
        - name: {{ kebabcase $serviceName }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag }}"
          imagePullPolicy: {{ $service.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ $service.service.port }}
              protocol: TCP
          env:
{{ toYaml $service.env | indent 12 }}
          envFrom:
            - configMapRef:
                name: banking-configmap
          resources:
{{ toYaml ($service.resources | default dict) | indent 12 }}
{{- if $service.livenessProbe }}
          livenessProbe:
{{ toYaml $service.livenessProbe | indent 12 }}
{{- end }}
{{- if $service.readinessProbe }}
          readinessProbe:
{{ toYaml $service.readinessProbe | indent 12 }}
{{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
{{- end }}
{{- end }}