{{/*
HorizontalPodAutoscaler for each microservice where autoscaling is enabled.
*/}}
{{- $root := . }}
{{- $namespace := .Values.global.namespace | default "banking" }}
{{- $services := list "gateway" "authService" "accountService" "transactionService" "fraudService" "notificationService" }}

{{- range $serviceName, $svc := .Values }}
{{- if and (kindIs "map" $svc) (has $serviceName $services) }}
{{- $autoscaling := $svc.autoscaling | default dict }}
{{- if and ($svc.enabled | default false) ($autoscaling.enabled | default false) }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $serviceName | kebabcase }}-hpa
  namespace: {{ $namespace }}
  labels:
    {{- include "banking-app.labels" $root | nindent 4 }}
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $serviceName }}
  minReplicas: {{ $autoscaling.minReplicas | default 2 }}
  maxReplicas: {{ $autoscaling.maxReplicas | default 10 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetCPUUtilizationPercentage | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
{{- end }}
{{- end }}
{{- end }}