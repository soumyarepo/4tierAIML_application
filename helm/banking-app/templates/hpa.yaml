{{/*
HorizontalPodAutoscaler for each microservice where autoscaling is enabled.
*/}}
{{- $root := . }}
{{- $namespace := .Values.global.namespace | default "banking" }}
{{- range $serviceName, $svc := .Values }}
{{-   if and (hasKey $svc "enabled") $svc.enabled }}
{{-     if has $serviceName (list "gateway" "authService" "accountService" "transactionService" "fraudService" "notificationService") }}
{{-       if $svc.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $serviceName }}-hpa
  namespace: {{ $namespace }}
  labels:
    {{- include "banking-app.labels" $root | nindent 4 }}
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $serviceName }}
  minReplicas: {{ $svc.autoscaling.minReplicas | default 2 }}
  maxReplicas: {{ $svc.autoscaling.maxReplicas | default 10 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetCPUUtilizationPercentage | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
{{-       end }}
{{-     end }}
{{-   end }}
{{- end }}