{{/*
ServiceAccount for the banking application.
All pods use this service account for inter-namespace or external access.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "banking-app.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace | default "banking" }}
  labels:
    {{- include "banking-app.labels" . | nindent 4 }}